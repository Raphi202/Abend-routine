<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Abend">
  <title>Abend-Routine</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f5f2ee;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      -webkit-font-smoothing: antialiased;
    }

    .screen { display: none; width: 100%; max-width: 400px; animation: fadeIn 0.5s ease; }
    .screen.active { display: flex; flex-direction: column; align-items: center; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: #999;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 400;
      color: #2c2c2c;
      line-height: 1.3;
      text-align: center;
      margin-bottom: 16px;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 400;
      color: #2c2c2c;
      line-height: 1.4;
      margin-bottom: 32px;
      align-self: flex-start;
    }

    .subtitle {
      font-size: 15px;
      font-weight: 300;
      color: #777;
      line-height: 1.7;
      text-align: center;
      margin-bottom: 48px;
    }

    .btn-primary {
      background: #2c2c2c;
      color: #f5f2ee;
      border: none;
      padding: 14px 36px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 0.05em;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s;
    }
    .btn-primary:active { background: #444; }

    .btn-ghost {
      background: transparent;
      color: #2c2c2c;
      border: 1px solid #2c2c2c;
      padding: 14px 36px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 0.05em;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }

    /* BREATH */
    .breath-container {
      position: relative;
      width: 260px;
      height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 48px;
    }

    .breath-outer {
      position: absolute;
      border-radius: 50%;
      opacity: 0.3;
      transition: width 0.1s linear, height 0.1s linear, background 0.6s ease;
    }

    .breath-ring {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 1.5px solid #a8c5b5;
      transition: border-color 0.6s ease;
    }

    .breath-label {
      position: relative;
      text-align: center;
      z-index: 1;
    }

    .breath-label p:first-child {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      color: #2c2c2c;
    }

    .breath-label p:last-child {
      font-size: 13px;
      color: #999;
      font-weight: 300;
      margin-top: 4px;
    }

    .breath-dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      height: 2px;
      border-radius: 2px;
      background: #ddd;
      transition: all 0.3s;
    }

    /* JOURNAL */
    .input-row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      width: 100%;
    }

    textarea {
      background: transparent;
      border: none;
      border-bottom: 1px solid #ccc;
      width: 100%;
      padding: 12px 0;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 300;
      color: #2c2c2c;
      resize: none;
      outline: none;
      line-height: 1.7;
    }
    textarea::placeholder { color: #bbb; }

    .mic-btn {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 1.5px solid #2c2c2c;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .mic-btn.active {
      background: #2c2c2c;
    }
    .mic-btn.active svg { stroke: #f5f2ee; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .pulsing { animation: pulse 1.2s ease-in-out infinite; }

    .journal-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-top: 48px;
    }

    /* DONE */
    .summary {
      background: #eeeae4;
      padding: 24px;
      border-radius: 4px;
      width: 100%;
      margin-bottom: 40px;
    }

    .summary-item { margin-bottom: 20px; }
    .summary-item:last-child { margin-bottom: 0; }

    .summary-q {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: #999;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .summary-a {
      font-size: 14px;
      font-weight: 300;
      color: #2c2c2c;
      line-height: 1.6;
    }

    /* HISTORY */
    .history-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: #bbb;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .history-panel {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #f5f2ee;
      z-index: 100;
      overflow-y: auto;
      padding: 32px 24px;
      animation: fadeIn 0.3s ease;
    }

    .history-panel.open { display: block; }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .close-btn {
      background: transparent;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #999;
      line-height: 1;
    }

    .entry-card {
      background: #eeeae4;
      padding: 20px;
      border-radius: 4px;
      margin-bottom: 16px;
    }

    .entry-date {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: #999;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <p class="label">Abend-Routine</p>
    <h1>Fünf Minuten<br>für dich.</h1>
    <p class="subtitle">Drei Atemzüge. Drei Fragen.<br>Dann ist der Tag wirklich vorbei.</p>
    <button class="btn-primary" onclick="startApp()">Jetzt starten</button>
  </div>

  <!-- BREATH -->
  <div id="screen-breath" class="screen">
    <p class="label" id="breath-counter">Atemübung · 1 / 3</p>
    <div class="breath-container">
      <div class="breath-outer" id="breath-outer" style="width:180px;height:180px;background:#a8c5b5;"></div>
      <div class="breath-ring" id="breath-ring"></div>
      <div class="breath-label">
        <p id="breath-phase-label">Einatmen</p>
        <p id="breath-phase-sec">4 Sekunden</p>
      </div>
    </div>
    <div class="breath-dots" id="breath-dots">
      <div class="dot" style="width:32px;background:#2c2c2c;"></div>
      <div class="dot" style="width:16px;"></div>
      <div class="dot" style="width:16px;"></div>
    </div>
  </div>

  <!-- JOURNAL -->
  <div id="screen-journal" class="screen">
    <p class="label" id="journal-counter">Journal · 1 / 3</p>
    <h2 id="journal-question">Was war heute gut?</h2>
    <div class="input-row">
      <textarea id="journal-textarea" rows="4" placeholder="Schreib oder sprich..."></textarea>
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2c2c2c" stroke-width="1.5" stroke-linecap="round" id="mic-icon">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0014 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="9" y1="22" x2="15" y2="22"/>
        </svg>
      </button>
    </div>
    <div class="journal-nav">
      <button class="btn-ghost" id="btn-back" onclick="prevJournal()" style="padding:10px 20px;font-size:13px;visibility:hidden;">Zurück</button>
      <button class="btn-primary" onclick="nextJournal()">Weiter</button>
    </div>
  </div>

  <!-- DONE -->
  <div id="screen-done" class="screen">
    <p class="label">Fertig</p>
    <h1 style="margin-bottom:16px;">Gut gemacht.</h1>
    <p class="subtitle">Der Tag ist vorbei.<br>Leg das Handy jetzt weg.</p>
    <div class="summary" id="summary"></div>
    <button class="btn-ghost" onclick="restart()">Neu starten</button>
  </div>

  <!-- HISTORY BUTTON -->
  <button class="history-btn" onclick="openHistory()">Verlauf</button>

  <!-- HISTORY PANEL -->
  <div class="history-panel" id="history-panel">
    <div class="history-header">
      <p class="label" style="margin:0;">Deine Einträge</p>
      <button class="close-btn" onclick="closeHistory()">×</button>
    </div>
    <div id="history-list"></div>
  </div>

<script>
  const PHASES = [
    { label: "Einatmen", duration: 4, color: "#a8c5b5" },
    { label: "Halten",   duration: 7, color: "#c5b8a8" },
    { label: "Ausatmen", duration: 8, color: "#a8b5c5" },
  ];

  const QUESTIONS = [
    "Was war heute gut?",
    "Was hat mich gestresst?",
    "Was nehme ich mir für morgen mit?",
  ];

  let breathPhase = 0, breathCycle = 0, breathTimer = null;
  let journalStep = 0, answers = ["", "", ""];
  let recognition = null, isListening = false;

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
  }

  // ─── BREATH ───────────────────────────────────────────
  function startApp() {
    breathPhase = 0; breathCycle = 0;
    showScreen('breath');
    runBreathPhase();
  }

  function runBreathPhase() {
    const phase = PHASES[breathPhase];
    const outer = document.getElementById('breath-outer');
    const ring = document.getElementById('breath-ring');
    const label = document.getElementById('breath-phase-label');
    const sec = document.getElementById('breath-phase-sec');
    const counter = document.getElementById('breath-counter');
    const dots = document.getElementById('breath-dots').children;

    label.textContent = phase.label;
    sec.textContent = phase.duration + ' Sekunden';
    counter.textContent = 'Atemübung · ' + (breathCycle + 1) + ' / 3';
    ring.style.borderColor = phase.color;
    outer.style.background = phase.color;

    for (let i = 0; i < dots.length; i++) {
      dots[i].style.width = i === breathPhase ? '32px' : '16px';
      dots[i].style.background = i === breathPhase ? '#2c2c2c' : '#ddd';
    }

    const totalMs = phase.duration * 1000;
    const interval = 50;
    let elapsed = 0;
    const baseSize = 180;
    const expand = 60;

    clearInterval(breathTimer);
    breathTimer = setInterval(() => {
      elapsed += interval;
      let size = baseSize;
      const p = elapsed / totalMs;
      if (breathPhase === 0) size = baseSize + p * expand;
      else if (breathPhase === 2) size = (baseSize + expand) - p * expand;
      else size = baseSize + expand;
      outer.style.width = size + 'px';
      outer.style.height = size + 'px';

      if (elapsed >= totalMs) {
        clearInterval(breathTimer);
        breathPhase = (breathPhase + 1) % 3;
        if (breathPhase === 0) {
          breathCycle++;
          if (breathCycle >= 3) {
            setTimeout(() => {
              journalStep = 0; answers = ["","",""];
              showScreen('journal');
              updateJournalUI();
            }, 600);
            return;
          }
        }
        runBreathPhase();
      }
    }, interval);
  }

  // ─── JOURNAL ──────────────────────────────────────────
  function updateJournalUI() {
    document.getElementById('journal-counter').textContent = 'Journal · ' + (journalStep + 1) + ' / 3';
    document.getElementById('journal-question').textContent = QUESTIONS[journalStep];
    document.getElementById('journal-textarea').value = answers[journalStep];
    document.getElementById('btn-back').style.visibility = journalStep > 0 ? 'visible' : 'hidden';
    const nextBtn = document.querySelector('#screen-journal .btn-primary');
    nextBtn.textContent = journalStep < 2 ? 'Weiter' : 'Abschliessen';
  }

  function nextJournal() {
    answers[journalStep] = document.getElementById('journal-textarea').value;
    if (journalStep < 2) { journalStep++; updateJournalUI(); }
    else { saveEntry(); showDone(); }
  }

  function prevJournal() {
    answers[journalStep] = document.getElementById('journal-textarea').value;
    journalStep--; updateJournalUI();
  }

  function showDone() {
    const summary = document.getElementById('summary');
    summary.innerHTML = QUESTIONS.map((q, i) => `
      <div class="summary-item">
        <p class="summary-q">${q}</p>
        <p class="summary-a">${answers[i] || '—'}</p>
      </div>
    `).join('');
    showScreen('done');
  }

  function restart() {
    breathPhase = 0; breathCycle = 0;
    journalStep = 0; answers = ["","",""];
    showScreen('home');
  }

  // ─── MIC ──────────────────────────────────────────────
  function toggleMic() {
    if (isListening) stopMic();
    else startMic();
  }

  function startMic() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Spracheingabe wird auf diesem Gerät nicht unterstützt.'); return; }
    recognition = new SR();
    recognition.lang = 'de-AT';
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.onresult = (e) => {
      const t = Array.from(e.results).map(r => r[0].transcript).join('');
      document.getElementById('journal-textarea').value = t;
    };
    recognition.onend = () => {
      answers[journalStep] = document.getElementById('journal-textarea').value;
      setMicState(false);
    };
    recognition.start();
    setMicState(true);
  }

  function stopMic() {
    recognition && recognition.stop();
    setMicState(false);
  }

  function setMicState(active) {
    isListening = active;
    const btn = document.getElementById('mic-btn');
    const icon = document.getElementById('mic-icon');
    if (active) {
      btn.classList.add('active', 'pulsing');
      icon.setAttribute('stroke', '#f5f2ee');
    } else {
      btn.classList.remove('active', 'pulsing');
      icon.setAttribute('stroke', '#2c2c2c');
    }
  }

  // ─── STORAGE ──────────────────────────────────────────
  function saveEntry() {
    const entries = JSON.parse(localStorage.getItem('abend_entries') || '[]');
    const today = new Date().toLocaleDateString('de-AT', { weekday: 'long', day: 'numeric', month: 'long' });
    entries.unshift({ date: today, answers: [...answers] });
    if (entries.length > 30) entries.pop();
    localStorage.setItem('abend_entries', JSON.stringify(entries));
  }

  function openHistory() {
    const entries = JSON.parse(localStorage.getItem('abend_entries') || '[]');
    const list = document.getElementById('history-list');
    if (!entries.length) {
      list.innerHTML = '<p style="color:#bbb;font-size:14px;font-weight:300;">Noch keine Einträge.</p>';
    } else {
      list.innerHTML = entries.map(e => `
        <div class="entry-card">
          <p class="entry-date">${e.date}</p>
          ${QUESTIONS.map((q, i) => `
            <div style="margin-bottom:${i<2?'14px':'0'}">
              <p class="summary-q">${q}</p>
              <p class="summary-a">${e.answers[i] || '—'}</p>
            </div>
          `).join('')}
        </div>
      `).join('');
    }
    document.getElementById('history-panel').classList.add('open');
  }

  function closeHistory() {
    document.getElementById('history-panel').classList.remove('open');
  }
</script>
</body>
</html>
